<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portal Extensionista - Feed</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      // Troque para o seu API Gateway, se necessário.
      window.__API_BASE_URL__ = 'https://9zb6ymlxwk.execute-api.sa-east-1.amazonaws.com';
    </script>
    <script defer src="./app.js"></script>
  </head>
  <body data-page="feed">
    <header class="header header-hero">
      <div class="container">
        <div class="row row-between" style="margin-bottom: 20px;">
          <div></div>
          <button id="themeToggle" class="btn" style="padding: 6px 12px; font-size: 12px;" title="Alternar tema">🌓 Modo</button>
        </div>
        <div class="brand">
          <img
            class="logo-flag"
            src="./guarulhos-flag.svg"
            alt="Bandeira de Guarulhos"
            width="120"
            height="80"
          />
          <div>
            <h1 class="title">Guarulhos em Foco</h1>
            <p class="kicker">Diário oficial traduzido em notícias claras</p>
            <p class="subtitle">
              Matérias geradas automaticamente a partir do Diário Oficial de Guarulhos.
            </p>
          </div>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <div class="row row-between">
          <h2 class="section-title">Últimas publicações</h2>
          <button id="refreshBtn" class="btn" type="button">Atualizar</button>
        </div>

        <div id="status" class="status" role="status" aria-live="polite"></div>

        <ul id="feedList" class="feed" aria-label="Lista de matérias"></ul>

        <div class="row row-center">
          <button id="loadMoreBtn" class="btn" type="button" hidden>Carregar mais</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <small>Hospedado no S3 • Consumindo API Gateway</small>
      </div>
    </footer>
  </body>
</html>
